<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ears -->
  <polygon points="23,35 15,10 40,30" fill="#1c1917" />
  <polygon points="77,35 85,10 60,30" fill="#1c1917" />
  
  <!-- Cat Face -->
  <circle cx="50" cy="55" r="30" fill="#1c1917" />
  
  <!-- Left Eye -->
  <ellipse cx="40" cy="50" rx="3" ry="5" fill="#fefcf8" />
  <circle cx="40" cy="50" r="1.5" fill="#1c1917" />
  
  <!-- Right Eye -->
  <ellipse cx="60" cy="50" rx="3" ry="5" fill="#fefcf8" />
  <circle cx="60" cy="50" r="1.5" fill="#1c1917" />
  
  <!-- Nose and Mouth -->
  <polygon points="50,57 47,54 53,54" fill="#fca5a5" />
  <path d="M46,60 Q50,57 50,57 Q50,57 54,60" stroke="#fefcf8" stroke-width="1.5" fill="none" />
  
  <!-- Whiskers -->
  <line x1="18" y1="55" x2="33" y2="57" stroke="#fefcf8" stroke-width="1" />
  <line x1="16" y1="62" x2="31" y2="61" stroke="#fefcf8" stroke-width="1" />
  <line x1="82" y1="55" x2="67" y2="57" stroke="#fefcf8" stroke-width="1" />
  <line x1="84" y1="62" x2="69" y2="61" stroke="#fefcf8" stroke-width="1" />
  
  <!-- Security Sunglasses -->
  <path d="M28,47 L72,47 L65,55 L35,55 Z" fill="#111111" stroke="#e8e4d5" stroke-width="1.5" />
  <line x1="28" y1="47" x2="23" y2="44" stroke="#111111" stroke-width="2" />
  <line x1="72" y1="47" x2="77" y2="44" stroke="#111111" stroke-width="2" />
</svg>
